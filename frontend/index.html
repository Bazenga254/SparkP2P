<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#0a0e1a" />

    <!-- Primary SEO -->
    <title>SparkP2P — Automated Binance P2P Trading Bot for Kenya</title>
    <meta name="description" content="SparkP2P automates your Binance P2P trading. Receive M-Pesa payments, release crypto automatically, and grow your trading volume 24/7. Built for Kenyan traders." />
    <meta name="keywords" content="Binance P2P Kenya, automated P2P trading, M-Pesa crypto, P2P trading bot, USDT Kenya, SparkP2P" />
    <link rel="canonical" href="https://sparkp2p.com/" />

    <!-- Open Graph (WhatsApp, Facebook previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sparkp2p.com/" />
    <meta property="og:title" content="SparkP2P — Automated Binance P2P Trading Bot" />
    <meta property="og:description" content="Automate your Binance P2P trading in Kenya. M-Pesa payments verified instantly, crypto released automatically. Start trading smarter." />
    <meta property="og:image" content="https://sparkp2p.com/og-image.png" />
    <meta property="og:site_name" content="SparkP2P" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SparkP2P — Automated Binance P2P Trading Bot" />
    <meta name="twitter:description" content="Automate your Binance P2P trading in Kenya. M-Pesa payments verified instantly, crypto released automatically." />
    <meta name="twitter:image" content="https://sparkp2p.com/og-image.png" />

    <!-- Structured Data: Organisation + Website (enables Google Sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://sparkp2p.com/#organization",
          "name": "SparkP2P",
          "url": "https://sparkp2p.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://sparkp2p.com/logo.png"
          },
          "description": "Automated Binance P2P trading platform for Kenyan traders. M-Pesa payment verification and automatic crypto release.",
          "areaServed": "KE",
          "sameAs": [
            "https://github.com/Bazenga254/SparkP2P"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://sparkp2p.com/#website",
          "url": "https://sparkp2p.com",
          "name": "SparkP2P",
          "publisher": { "@id": "https://sparkp2p.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://sparkp2p.com/dashboard?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "SiteLinksNavigationElement",
          "name": "SparkP2P Navigation",
          "hasPart": [
            { "@type": "SiteLinksNavigationElement", "name": "Log In",    "url": "https://sparkp2p.com/login" },
            { "@type": "SiteLinksNavigationElement", "name": "Sign Up",   "url": "https://sparkp2p.com/register" },
            { "@type": "SiteLinksNavigationElement", "name": "Dashboard", "url": "https://sparkp2p.com/dashboard" },
            { "@type": "SiteLinksNavigationElement", "name": "Download",  "url": "https://sparkp2p.com/download" }
          ]
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-X790E5TY6T"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-X790E5TY6T');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
