<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: transparent; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

.widget {
  width: 100%; height: 100%;
  background: rgba(10,12,24,0.94);
  border: 1px solid rgba(245,158,11,0.5);
  border-radius: 14px;
  padding: 11px 14px 10px;
  backdrop-filter: blur(8px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  display: flex; flex-direction: column; gap: 7px;
}

.widget-header { display: flex; align-items: center; gap: 7px; }
.lock-icon { font-size: 13px; }
.title { color: #f59e0b; font-size: 12px; font-weight: 700; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981;
  animation: pulse 1.6s ease-in-out infinite; margin-left: auto; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 7px 10px;
  color: #fff; font-size: 18px; letter-spacing: 7px; text-align: center;
  outline: none; transition: border-color 0.15s;
}
input:focus { border-color: #f59e0b; }
input::placeholder { letter-spacing: 2px; font-size: 12px; color: rgba(255,255,255,0.25); }

.btn {
  width: 100%;
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: #0d0f1e; border: none; border-radius: 7px;
  padding: 7px; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

.error { color: #f87171; font-size: 11px; text-align: center; display: none; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header">
    <span class="lock-icon">🔒</span>
    <span class="title">SparkP2P Bot Active</span>
    <span class="dot"></span>
  </div>
  <input type="text" id="totp" maxlength="6" placeholder="Authenticator" autocomplete="off" inputmode="numeric" />
  <button class="btn" id="btn" onclick="unlock()">Unlock</button>
  <div class="error" id="err"></div>
</div>

<script>
const { ipcRenderer } = require('electron');

async function unlock() {
  const totp = document.getElementById('totp').value.replace(/\s/g, '');
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  if (totp.length !== 6) { showErr('Enter 6-digit code'); return; }
  btn.disabled = true; btn.textContent = '...'; err.style.display = 'none';
  try {
    const result = await ipcRenderer.invoke('lock-unlock', { totp });
    if (!result.success) {
      showErr(result.message || 'Invalid code');
      document.getElementById('totp').value = '';
      document.getElementById('totp').focus();
    }
  } catch (e) { showErr('Failed. Try again.'); }
  btn.disabled = false; btn.textContent = 'Unlock';
}

function showErr(msg) {
  const err = document.getElementById('err');
  err.textContent = msg; err.style.display = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
document.getElementById('totp').focus();
</script>
</body>
</html>
