<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e4e4e7; }

    .header { display: flex; align-items: center; gap: 10px; padding: 16px; border-bottom: 1px solid #2a2d3a; }
    .header img { width: 32px; height: 32px; border-radius: 8px; }
    .header h1 { font-size: 16px; color: #f59e0b; }
    .header span { font-size: 11px; color: #9ca3af; }

    .section { padding: 16px; }
    .section + .section { border-top: 1px solid #2a2d3a; }

    /* Status */
    .status-row { display: flex; align-items: center; justify-content: space-between; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-dot.green { background: #10b981; box-shadow: 0 0 6px #10b981; }
    .status-dot.red { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
    .status-dot.yellow { background: #f59e0b; }
    .status-text { font-size: 13px; display: flex; align-items: center; }
    .last-sync { font-size: 11px; color: #6b7280; }

    /* Login form */
    .login-section label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 4px; }
    .login-section input { width: 100%; padding: 8px 10px; background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 6px; color: #e4e4e7; font-size: 13px; margin-bottom: 10px; }
    .login-section input:focus { outline: none; border-color: #f59e0b; }

    /* Buttons */
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #f59e0b; color: #000; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #1a1d27; color: #e4e4e7; border: 1px solid #2a2d3a; margin-top: 8px; }
    .btn-secondary:hover { border-color: #f59e0b; }
    .btn-danger { background: transparent; color: #ef4444; border: 1px solid #ef4444; margin-top: 8px; }

    /* Toggle */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .toggle-row label { font-size: 12px; color: #9ca3af; }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #2a2d3a; border-radius: 22px; cursor: pointer; transition: 0.2s; }
    .toggle .slider:before { content: ''; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #6b7280; border-radius: 50%; transition: 0.2s; }
    .toggle input:checked + .slider { background: #f59e0b; }
    .toggle input:checked + .slider:before { transform: translateX(18px); background: #000; }

    .msg { font-size: 12px; padding: 8px; border-radius: 6px; margin-top: 8px; }
    .msg.success { background: rgba(16, 185, 129, 0.15); color: #10b981; }
    .msg.error { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

    .footer { padding: 12px 16px; text-align: center; font-size: 10px; color: #6b7280; border-top: 1px solid #2a2d3a; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="SparkP2P">
    <div>
      <h1>SparkP2P</h1>
      <span>Binance P2P Automation</span>
    </div>
  </div>

  <!-- Not logged in -->
  <div id="login-view" class="section login-section" style="display:none;">
    <label>SparkP2P Email</label>
    <input type="email" id="email" placeholder="you@example.com">
    <label>Password</label>
    <input type="password" id="password" placeholder="Your password">
    <button class="btn btn-primary" id="login-btn">Login to SparkP2P</button>
    <div id="login-msg"></div>
  </div>

  <!-- Logged in -->
  <div id="main-view" style="display:none;">
    <div class="section">
      <div class="status-row">
        <div class="status-text">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-label">Checking...</span>
        </div>
        <span class="last-sync" id="last-sync"></span>
      </div>
    </div>

    <div class="section">
      <button class="btn btn-primary" id="sync-btn">Sync Binance Cookies</button>
      <button class="btn btn-secondary" id="check-btn">Check Status</button>
      <div class="toggle-row">
        <label>Auto-sync when cookies change</label>
        <label class="toggle">
          <input type="checkbox" id="auto-sync" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div id="sync-msg"></div>
    </div>

    <div class="section">
      <button class="btn btn-danger" id="logout-btn">Logout from SparkP2P</button>
    </div>
  </div>

  <div class="footer">SparkP2P v1.0 &bull; Powered by Spark AI</div>

  <script src="popup.js"></script>
</body>
</html>
